<!doctype html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8" />
    <title>Calculadora Online</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="index.js" defer></script>
    <link rel="stylesheet" href="output.css" />
</head>


<body class="flex min-h-screen items-center justify-center bg-gray-100 dark:bg-gray-900 sm:px-3.5">
<div id="calculator-container" class="w-72 rounded-xl border-2 border-gray-300 dark:border-purple-300 bg-white dark:bg-gray-950 p-8 shadow-lg sm:w-full sm:max-w-xs">
    <fieldset id="calculator-screen" class="mb-4">
        <legend class="mx-2 text-sm font-semibold text-gray-600 sm:text-2xl dark:text-purple-500 ">Calculadora Online</legend>
        <label for="screen"></label>
        <div class="mt-1 rounded border border-blue-500 dark:border-purple-300">
            <input id="screen" type="text" value="0" readonly class="w-full rounded bg-gray-50 dark:bg-black dark:text-purple-600 dark:text-shadow-pink-100 px-3 py-2 text-right text-xl outline-none" />
        </div>
    </fieldset>
    <button id="theme-toggle" class="darkModeButton">☀️</button>
    <div id="button-container" class="grid grid-cols-4 gap-2">
        <button value="7" class="button">7</button>
        <button value="8" class="button">8</button>
        <button value="9" class="button">9</button>
        <button value="4" class="button">4</button>
        <button value="5" class="button">5</button>
        <button value="6" class="button">6</button>
        <button value="1" class="button">1</button>
        <button value="2" class="button">2</button>
        <button value="3" class="button">3</button>
        <button value="0" class="button">0</button>
        <button id="dot" value="." class="button">.</button>
        <button id="add" value="+" class="button">+</button>
        <button id="subtract" value="-" class="button">-</button>
        <button id="multiply" value="*" class="button">*</button>
        <button id="divide" value="/" class="button">/</button>
        <button id="equals" value="=" class="button">=</button>
        <button id="delete" value="del" class="button col-span-2">del</button>
        <button id="clear" value="c" class="button col-span-2">c</button>
    </div>
</div>
</body>
</html>
